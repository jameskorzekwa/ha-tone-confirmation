<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision">
  <!-- Background — same charcoal + corner radius as the weather-app brand
       icon so James's integrations share a visual language. -->
  <rect width="128" height="128" rx="22" fill="#1c1f26"/>
  <!-- Speech bubble (conversation) in white. -->
  <g fill="#ffffff">
    <rect x="18" y="26" width="92" height="64" rx="18"/>
    <path d="M38 84 L38 106 L62 84 Z"/>
  </g>
  <!-- Tone bars (chime waveform) inside the bubble, charcoal. -->
  <g fill="#1c1f26">
    <rect x="34" y="52" width="9" height="20" rx="4.5"/>
    <rect x="50" y="42" width="9" height="40" rx="4.5"/>
    <rect x="66" y="48" width="9" height="28" rx="4.5"/>
    <rect x="82" y="38" width="9" height="48" rx="4.5"/>
  </g>
  <!-- Confirmation badge — green check, bottom-right, overlapping. -->
  <circle cx="96" cy="92" r="22" fill="#34d399" stroke="#1c1f26" stroke-width="6"/>
  <path d="M85 92 L93 100 L108 84" fill="none" stroke="#1c1f26" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
