name: Test

on:
  push:
    paths-ignore:
      - 'AGENTS.md'
      - '**/AGENTS.md'
  pull_request:
    paths-ignore:
      - 'AGENTS.md'
      - '**/AGENTS.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Ruff and pytest
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Run Ruff
        run: ruff check .

      - name: Check Ruff formatting
        run: ruff format --check .

      - name: Run tests
        run: pytest

      - name: Verify release archive
        run: bash .github/scripts/build_release.sh
