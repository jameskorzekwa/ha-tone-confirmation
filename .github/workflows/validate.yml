name: Validate

on:
  push:
    paths-ignore:
      - 'AGENTS.md'
      - '**/AGENTS.md'
  pull_request:
    paths-ignore:
      - 'AGENTS.md'
      - '**/AGENTS.md'
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - name: Validate HACS repository
        uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Validate Home Assistant integration
        uses: home-assistant/actions/hassfest@master
